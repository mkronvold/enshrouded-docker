networks:
  enshrouded-docker_default:
    name: enshrouded-docker_default

services:
  enshrouded:
    image: enshrouded-docker:latest
    build:
      context: ./windows
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "15636:15636/udp"
      - "15636:15636/tcp"
      - "15637:15637/udp"
      - "15637:15637/tcp"
    volumes:
      - ./enshrouded:C:\enshrouded
    networks:
      - enshrouded-docker_default
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: '8g'
